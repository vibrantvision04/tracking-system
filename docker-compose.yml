version: '3.8'

services:
  app:
    build: .
    ports:
      - "5027:5027"
      - "8080:8080"
      - "8081:8081"
    environment:
      - DB_DSN=postgres://gps:password@db:5432/gpsdb
      - REDIS_ADDR=redis:6379
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=gpsdb
      - POSTGRES_USER=gps
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
